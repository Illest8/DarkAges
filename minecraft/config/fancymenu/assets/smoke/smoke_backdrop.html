<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Skyrim Smoke Effect</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background: #050509;
            overflow: hidden;
        }
        canvas {
            display: block;
        }
    </style>
</head>
<body>
    <canvas id="canvas"></canvas>

    <script>
        const canvas = document.getElementById('canvas');
        const gl = canvas.getContext('webgl');

        if (!gl) {
            alert('WebGL not supported');
        }

        const vertexShaderSource = `
            attribute vec2 a_position;
            varying vec2 v_uv;
            
            void main() {
                v_uv = a_position * 0.5 + 0.5;
                gl_Position = vec4(a_position, 0.0, 1.0);
            }
        `;

        const fragmentShaderSource = `
            precision mediump float;
            varying vec2 v_uv;
            uniform float u_time;
            uniform vec2 u_resolution;
            uniform vec3 u_smokeColor;

            vec4 permute(vec4 x){return mod(((x*34.0)+1.0)*x, 289.0);}
            vec4 taylorInvSqrt(vec4 r){return 1.79284291400159 - 0.85373472095314 * r;}
            
            float snoise(vec3 v){ 
                const vec2 C = vec2(1.0/6.0, 1.0/3.0);
                const vec4 D = vec4(0.0, 0.5, 1.0, 2.0);
                
                vec3 i = floor(v + dot(v, C.yyy));
                vec3 x0 = v - i + dot(i, C.xxx);
                
                vec3 g = step(x0.yzx, x0.xyz);
                vec3 l = 1.0 - g;
                vec3 i1 = min(g.xyz, l.zxy);
                vec3 i2 = max(g.xyz, l.zxy);
                
                vec3 x1 = x0 - i1 + 1.0 * C.xxx;
                vec3 x2 = x0 - i2 + 2.0 * C.xxx;
                vec3 x3 = x0 - 1.0 + 3.0 * C.xxx;
                
                i = mod(i, 289.0);
                vec4 p = permute(permute(permute(
                    i.z + vec4(0.0, i1.z, i2.z, 1.0))
                    + i.y + vec4(0.0, i1.y, i2.y, 1.0))
                    + i.x + vec4(0.0, i1.x, i2.x, 1.0));
                
                float n_ = 1.0/7.0;
                vec3 ns = n_ * D.wyz - D.xzx;
                vec4 j = p - 49.0 * floor(p * ns.z * ns.z);
                vec4 x_ = floor(j * ns.z);
                vec4 y_ = floor(j - 7.0 * x_);
                vec4 x = x_ * ns.x + ns.yyyy;
                vec4 y = y_ * ns.x + ns.yyyy;
                vec4 h = 1.0 - abs(x) - abs(y);
                vec4 b0 = vec4(x.xy, y.xy);
                vec4 b1 = vec4(x.zw, y.zw);
                vec4 s0 = floor(b0) * 2.0 + 1.0;
                vec4 s1 = floor(b1) * 2.0 + 1.0;
                vec4 sh = -step(h, vec4(0.0));
                vec4 a0 = b0.xzyw + s0.xzyw * sh.xxyy;
                vec4 a1 = b1.xzyw + s1.xzyw * sh.zzww;
                vec3 p0 = vec3(a0.xy, h.x);
                vec3 p1 = vec3(a0.zw, h.y);
                vec3 p2 = vec3(a1.xy, h.z);
                vec3 p3 = vec3(a1.zw, h.w);
                
                vec4 norm = taylorInvSqrt(vec4(dot(p0,p0), dot(p1,p1), dot(p2,p2), dot(p3,p3)));
                p0 *= norm.x;
                p1 *= norm.y;
                p2 *= norm.z;
                p3 *= norm.w;
                
                vec4 m = max(0.6 - vec4(dot(x0,x0), dot(x1,x1), dot(x2,x2), dot(x3,x3)), 0.0);
                m = m * m;
                return 42.0 * dot(m*m, vec4(dot(p0,x0), dot(p1,x1), dot(p2,x2), dot(p3,x3)));
            }

            float fbm(in vec3 st) {
                float value = 0.0;
                float amplitude = 0.80;
                
                for (int i = 0; i < 4; i++) {
                    value += amplitude * snoise(st);
                    st *= 2.0;
                    amplitude *= 0.5;
                }
                return value;
            }

            mat2 rotate(float angle) {
                float c = cos(angle);
                float s = sin(angle);
                return mat2(c, -s, s, c);
            }

            void main() {
                vec2 pixelatedUV = floor(v_uv * u_resolution / 8.0) * 8.0 / u_resolution;
                vec2 fragCoord = pixelatedUV * u_resolution;
                vec2 uv = (fragCoord - 0.5 * u_resolution.xy) / u_resolution.y;
                
                float rotationRad = 293.0 * 3.14159265359 / 180.0;
                uv = rotate(rotationRad) * uv;
                
                float topMask;
                if (10.0 <= 0.0) {
                    topMask = 0.0;
                } else if (10.0 >= 100.0) {
                    topMask = 1.0;
                } else {
                    float dissipationHeight = 10.0 / 100.0;
                    float fadeStart = 1.0 - dissipationHeight;
                    float fadeEnd = 1.0;
                    
                    if (pixelatedUV.y <= fadeStart) {
                        topMask = 1.0;
                    } else if (pixelatedUV.y >= fadeEnd) {
                        topMask = 0.0;
                    } else {
                        topMask = 1.0 - ((pixelatedUV.y - fadeStart) / (fadeEnd - fadeStart));
                    }
                }
                
                if (topMask <= 0.0) {
                    gl_FragColor = vec4(0.0);
                    return;
                }
                
                float time = u_time * 0.2;
                float plainY = uv.y + 0.5;
                uv *= 2.4;
                
                float mag = 0.2;
                float n = fbm(vec3(uv, time * 0.2));
                n = fbm(vec3(uv - time * 0.2, n * mag + time * 0.1));
                n = fbm(vec3(uv - time * 0.4, n * mag + time * 0.2));
                
                n *= 0.6;
                n = n * 0.5 + 0.5;
                n = pow(n, 0.5 + plainY * (1.0 - 0.5));
                n *= 1.0 - plainY;
                n *= 0.6;
                n *= topMask;
                
                float rightFadeStart = 65.0 / 100.0;
                float rightMask;
                if (65.0 <= 0.0) {
                    rightMask = 0.0;
                } else if (65.0 >= 100.0) {
                    rightMask = 1.0;
                } else {
                    rightMask = 1.0 - smoothstep(rightFadeStart, 1.0, pixelatedUV.x);
                }
                n *= rightMask;
                
                vec3 color = u_smokeColor * n;
                
                float variation = fbm(vec3(uv * 0.5, time * 0.1));
                color *= 0.8 + variation * 0.4;
                
                gl_FragColor = vec4(color, n * 0.8);
            }
        `;

        function createShader(gl, type, source) {
            const shader = gl.createShader(type);
            gl.shaderSource(shader, source);
            gl.compileShader(shader);
            
            if (!gl.getShaderParameter(shader, gl.COMPILE_STATUS)) {
                console.error('Shader compile error:', gl.getShaderInfoLog(shader));
                gl.deleteShader(shader);
                return null;
            }
            
            return shader;
        }

        function createProgram(gl, vertexShader, fragmentShader) {
            const program = gl.createProgram();
            gl.attachShader(program, vertexShader);
            gl.attachShader(program, fragmentShader);
            gl.linkProgram(program);
            
            if (!gl.getProgramParameter(program, gl.LINK_STATUS)) {
                console.error('Program link error:', gl.getProgramInfoLog(program));
                gl.deleteProgram(program);
                return null;
            }
            
            return program;
        }

        const vertexShader = createShader(gl, gl.VERTEX_SHADER, vertexShaderSource);
        const fragmentShader = createShader(gl, gl.FRAGMENT_SHADER, fragmentShaderSource);
        const program = createProgram(gl, vertexShader, fragmentShader);

        const positionAttributeLocation = gl.getAttribLocation(program, 'a_position');
        const timeUniformLocation = gl.getUniformLocation(program, 'u_time');
        const resolutionUniformLocation = gl.getUniformLocation(program, 'u_resolution');
        const smokeColorUniformLocation = gl.getUniformLocation(program, 'u_smokeColor');

        const positionBuffer = gl.createBuffer();
        gl.bindBuffer(gl.ARRAY_BUFFER, positionBuffer);
        gl.bufferData(gl.ARRAY_BUFFER, new Float32Array([
            -1, -1,
             1, -1,
            -1,  1,
             1,  1,
        ]), gl.STATIC_DRAW);

        function resizeCanvas() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
            gl.viewport(0, 0, canvas.width, canvas.height);
        }

        window.addEventListener('resize', resizeCanvas);
        resizeCanvas();

        let startTime = null;
        
        function render(time) {
            if (startTime === null) startTime = time;
            const elapsedTime = (time - startTime) * 0.001;

            gl.enable(gl.BLEND);
            gl.blendFunc(gl.SRC_ALPHA, gl.ONE_MINUS_SRC_ALPHA);

            const bgR = parseInt("#050509".slice(1, 3), 16) / 255;
                const bgG = parseInt("#050509".slice(3, 5), 16) / 255;
                const bgB = parseInt("#050509".slice(5, 7), 16) / 255;
                gl.clearColor(bgR, bgG, bgB, 1.0);
            gl.clear(gl.COLOR_BUFFER_BIT);

            gl.useProgram(program);

            gl.uniform1f(timeUniformLocation, elapsedTime);
            gl.uniform2f(resolutionUniformLocation, canvas.width, canvas.height);
            
            const smokeR = parseInt("#7a8fa5".slice(1, 3), 16) / 255;
            const smokeG = parseInt("#7a8fa5".slice(3, 5), 16) / 255;
            const smokeB = parseInt("#7a8fa5".slice(5, 7), 16) / 255;
            gl.uniform3f(smokeColorUniformLocation, smokeR, smokeG, smokeB);

            gl.bindBuffer(gl.ARRAY_BUFFER, positionBuffer);
            gl.enableVertexAttribArray(positionAttributeLocation);
            gl.vertexAttribPointer(positionAttributeLocation, 2, gl.FLOAT, false, 0, 0);

            gl.drawArrays(gl.TRIANGLE_STRIP, 0, 4);

            requestAnimationFrame(render);
        }

        requestAnimationFrame(render);
    </script>
</body>
</html>
